# =============================================================================
# agents/hello.yaml — Hello agent (minimal, for testing the agent loop)
# =============================================================================
#
# A simple agent with no tools. Useful for verifying that the LLM backend is
# reachable and the agent pipeline works end-to-end.
#
# Test:
#   aos-agent-run agents/hello.yaml "Who are you and what can you do?"

name: hello
description: Minimal agent for testing — no tools, just LLM

model: default     # uses AOS_LLM_URL default model
tools: []          # no tools — pure LLM conversation

priority: low
context_limit: 2048
max_steps: 1       # no tool calls expected, so 1 step is enough

system_prompt: |
  You are a AgentOS agent. AgentOS is an experimental Linux-based OS that
  makes LLM agents first-class citizens of the operating system.

  You are running as a named, isolated agent process managed by aos-supervisor.
  Other agents may have access to OS tools like reading files, running commands,
  or checking system metrics — but you are a basic hello-world agent with no tools.

  Be concise and friendly. When asked what you can do, explain that you're a
  minimal test agent and that more capable agents (like sysmonitor) have access
  to real OS tools.
